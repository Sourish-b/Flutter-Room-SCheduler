<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RoomScheduler</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#534ab7;--purple-light:#eeedfe;--purple-dark:#26215c;--purple-mid:#7f77dd;
  --green:#1a7a4a;--green-light:#e8f8f0;--red:#c0392b;--red-light:#fde8e8;
  --amber:#b8760a;--amber-light:#fff8e8;--gray:#f5f4fb;--white:#fff;
  --border:#eeeaf8;--text:#26215c;--text-muted:#888;--text-hint:#bbb;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--gray);min-height:100vh;display:flex;flex-direction:column;align-items:center}
.app{width:100%;max-width:520px;min-height:100vh;display:flex;flex-direction:column;position:relative;background:var(--gray)}
.header{background:var(--white);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;color:var(--purple-dark);letter-spacing:-.02em;text-decoration:none}
.logo-icon{width:28px;height:28px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center}
.body{flex:1;overflow-y:auto;padding-bottom:80px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;background:var(--white);border-top:1px solid var(--border);display:flex;padding:8px 0 12px;z-index:99}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:6px 0;color:var(--text-hint);font-size:11px;font-weight:400;font-family:'DM Sans',sans-serif;transition:color .15s}
.nav-btn.active{color:var(--purple);font-weight:600}
.nav-btn svg path,.nav-btn svg rect,.nav-btn svg circle{transition:all .15s}

/* Cards & Sections */
.hero-card{background:linear-gradient(135deg,#534ab7,#3c3489);margin:16px;border-radius:16px;padding:20px;color:#fff}
.hero-day{font-size:13px;opacity:.75;margin-bottom:4px}
.hero-time{font-size:26px;font-weight:700;letter-spacing:-.03em}
.hero-sub{margin-top:10px;font-size:12px;opacity:.7}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:0 16px 16px}
.stat-card{background:var(--white);border-radius:12px;padding:14px 12px;text-align:center;border:1px solid var(--border)}
.stat-num{font-size:28px;font-weight:700;line-height:1}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:4px}
.section-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase;padding:0 20px;margin-bottom:8px;margin-top:4px}
.card{background:var(--white);margin:0 16px;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.card+.section-title{margin-top:16px}

/* Room Row */
.room-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f3f0fb;cursor:pointer;transition:background .12s}
.room-row:last-child{border-bottom:none}
.room-row:hover{background:#f9f8fd}
.room-num{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;color:var(--purple-dark);width:44px;flex-shrink:0}
.room-info{flex:1;margin-left:12px}
.room-class{font-size:13px;color:var(--text);font-weight:500}
.room-faculty{font-size:12px;color:var(--text-muted);margin-top:2px}
.chevron{color:var(--text-hint);font-size:18px}
.tbl-head{display:grid;grid-template-columns:52px 70px 1fr 24px;padding:8px 16px;background:#f9f8fd;border-bottom:1px solid var(--border)}
.tbl-head span{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.06em;text-transform:uppercase}

/* Status Badge */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:.06em;white-space:nowrap}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-free{background:var(--green-light);color:var(--green)}
.badge-free .badge-dot{background:#2ecc71}
.badge-busy{background:var(--red-light);color:var(--red)}
.badge-busy .badge-dot{background:#e74c3c}
.badge-soon{background:var(--amber-light);color:var(--amber)}
.badge-soon .badge-dot{background:#f39c12}

/* Schedule Timeline */
.timeline-row{display:flex;align-items:flex-start;padding:12px 16px;border-bottom:1px solid #f5f3fb}
.timeline-row:last-child{border-bottom:none}
.timeline-row.current{background:#f0eeff}
.time-col{display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0;margin-right:14px}
.time-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);font-weight:400}
.time-line{width:1px;height:20px;background:#e8e4f8;margin:4px 0}
.available-pill{font-size:13px;color:var(--green);font-weight:500;background:var(--green-light);display:inline-block;padding:3px 12px;border-radius:20px}
.subject-title{font-weight:600;font-size:14px;color:var(--purple-dark)}
.subject-meta{font-size:12px;color:var(--text-muted);margin-top:3px}
.current-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);margin-left:8px;flex-shrink:0;margin-top:4px}

/* Forms */
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px}
.form-input,.form-select{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;background:var(--white);transition:border-color .15s}
.form-input:focus,.form-select:focus{border-color:var(--purple)}
.btn-primary{width:100%;background:var(--purple);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;letter-spacing:-.01em}
.btn-primary:hover{background:#4840a8}
.btn-primary:disabled{background:#a09dd6;cursor:not-allowed}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 20px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-outline:hover{border-color:var(--purple);color:var(--purple)}
.btn-back{background:none;border:none;cursor:pointer;color:var(--purple);display:flex;align-items:center;gap:4px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;padding:4px 0}

/* Teacher quick select */
.teacher-row{padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--white);transition:background .12s;border-bottom:1px solid #f5f3fb}
.teacher-row:last-child{border-bottom:none}
.teacher-row:hover{background:#f9f8fd}
.avatar{border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--purple);flex-shrink:0;font-size:13px}

/* Upload dropzone */
.dropzone{border:2px dashed #d4d0f5;border-radius:12px;padding:36px 24px;text-align:center;cursor:pointer;transition:border-color .2s;background:var(--white)}
.dropzone:hover,.dropzone.drag{border-color:var(--purple)}
.dropzone-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}

/* Success/Error states */
.alert{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:12px}
.alert-success{background:var(--green-light);color:var(--green)}
.alert-error{background:var(--red-light);color:var(--red)}
.alert-info{background:var(--purple-light);color:var(--purple)}

/* Booking card */
.booking-row{padding:14px 16px;display:flex;align-items:center;border-bottom:1px solid #f5f3fb}
.booking-row:last-child{border-bottom:none}
.booking-icon{width:40px;height:40px;background:var(--purple-light);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-right:12px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--purple);flex-shrink:0}

/* Filter bar */
.filter-bar{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto}
.filter-btn{border:1px solid var(--border);background:var(--white);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}
.filter-btn.active{background:var(--purple);border-color:var(--purple);color:#fff}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#26215c;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}

/* Loading spinner */
.spinner{width:32px;height:32px;border:3px solid var(--purple-light);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:40px}

/* Fade in */
.screen{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="8" height="8" rx="2" fill="#fff"/>
          <rect x="13" y="3" width="8" height="8" rx="2" fill="rgba(255,255,255,.5)"/>
          <rect x="3" y="13" width="8" height="8" rx="2" fill="rgba(255,255,255,.5)"/>
          <rect x="13" y="13" width="8" height="8" rx="2" fill="#fff"/>
        </svg>
      </div>
      RoomScheduler
    </a>
    <div id="header-right"></div>
  </div>
  <div class="body" id="body"></div>
  <nav class="nav">
    <button class="nav-btn active" id="nav-dashboard" onclick="navigate('dashboard')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="8" height="8" rx="2" id="ni1" fill="#534ab7"/>
        <rect x="13" y="3" width="8" height="8" rx="2" id="ni2" fill="#7f77dd"/>
        <rect x="3" y="13" width="8" height="8" rx="2" id="ni3" fill="#7f77dd"/>
        <rect x="13" y="13" width="8" height="8" rx="2" id="ni4" fill="#534ab7"/>
      </svg>
      Dashboard
    </button>
    <button class="nav-btn" id="nav-upload" onclick="navigate('upload')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M12 16V8M12 8L8.5 11.5M12 8L15.5 11.5" stroke="#ccc" stroke-width="1.8" stroke-linecap="round" id="nu1"/>
        <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="#ccc" stroke-width="1.8" stroke-linecap="round" id="nu2"/>
      </svg>
      Upload
    </button>
    <button class="nav-btn" id="nav-teacher" onclick="navigate('teacher')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" id="nt1" fill="#ccc"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#ccc" stroke-width="1.8" stroke-linecap="round" id="nt2"/>
      </svg>
      Teacher
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '';  // same origin
let currentScreen = 'dashboard';
let currentRoom = null;
let teacher = null;
let dashData = null;
let filterStatus = 'all';
let filterBuilding = 'all';

// ── Helpers ──────────────────────────────────────────────────
async function api(path, opts={}) {
  const r = await fetch(API + path, {
    headers:{'Content-Type':'application/json'},
    ...opts
  });
  return r.json();
}

function toast(msg, dur=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function badge(status) {
  const map = {free:'FREE',busy:'BUSY',soon:'SOON'};
  return `<span class="badge badge-${status}"><span class="badge-dot"></span>${map[status]||status.toUpperCase()}</span>`;
}

function avatar(name, size=36) {
  const ini = name.split(' ').filter(Boolean).slice(-2).map(w=>w[0]).join('').toUpperCase();
  return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${size*0.34}px">${ini}</div>`;
}

function loading() {
  return `<div class="loading-wrap"><div class="spinner"></div></div>`;
}

function getNow() {
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  return {
    day: days[now.getDay()],
    time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`
  };
}

function setNavActive(screen) {
  ['dashboard','upload','teacher'].forEach(s => {
    const btn = document.getElementById('nav-'+s);
    btn.classList.toggle('active', s === screen || (s==='dashboard' && screen==='room'));
  });
  // Icon colors
  const purple = '#534ab7', gray = '#ccc';
  const isDash = screen==='dashboard'||screen==='room';
  document.getElementById('ni1').setAttribute('fill', isDash?purple:gray);
  document.getElementById('ni2').setAttribute('fill', isDash?'#7f77dd':gray);
  document.getElementById('ni3').setAttribute('fill', isDash?'#7f77dd':gray);
  document.getElementById('ni4').setAttribute('fill', isDash?purple:gray);
  const isUp = screen==='upload';
  document.getElementById('nu1').setAttribute('stroke', isUp?purple:gray);
  document.getElementById('nu2').setAttribute('stroke', isUp?purple:gray);
  const isTch = screen==='teacher'||screen==='booking';
  document.getElementById('nt1').setAttribute('fill', isTch?purple:gray);
  document.getElementById('nt2').setAttribute('stroke', isTch?purple:gray);
}

function navigate(screen, params={}) {
  currentScreen = screen;
  if (params.room) currentRoom = params.room;
  setNavActive(screen);
  render();
}

// ── Screens ──────────────────────────────────────────────────

async function renderDashboard() {
  document.getElementById('body').innerHTML = loading();
  const now = getNow();
  const data = await api(`/api/rooms/status?day=${now.day}&time=${now.time}`);
  dashData = data;

  // Header right
  document.getElementById('header-right').innerHTML = teacher
    ? `${avatar(teacher.name,30)}`
    : `<span style="font-size:12px;color:var(--text-muted)">${now.day}</span>`;

  const slotStr = getSlotLabel(now.time);
  let rooms = data.rooms || [];

  // Apply filters
  let filtered = rooms;
  if (filterStatus !== 'all') filtered = filtered.filter(r => r.status === filterStatus);
  if (filterBuilding !== 'all') filtered = filtered.filter(r => r.building === filterBuilding);

  const buildings = [...new Set(rooms.map(r=>r.building))];

  document.getElementById('body').innerHTML = `
  <div class="screen">
    <div class="hero-card">
      <div class="hero-day">${now.day}</div>
      <div class="hero-time">${slotStr}</div>
      <div class="hero-sub">Live room status · ${rooms.length} rooms tracked</div>
    </div>
    <div class="stats-row">
      <div class="stat-card" style="cursor:pointer" onclick="setFilter('status','free')">
        <div class="stat-num" style="color:#1a7a4a">${data.summary?.free||0}</div>
        <div class="stat-label">Free</div>
      </div>
      <div class="stat-card" style="cursor:pointer" onclick="setFilter('status','busy')">
        <div class="stat-num" style="color:#c0392b">${data.summary?.busy||0}</div>
        <div class="stat-label">Busy</div>
      </div>
      <div class="stat-card" style="cursor:pointer" onclick="setFilter('status','soon')">
        <div class="stat-num" style="color:#b8760a">${data.summary?.soon||0}</div>
        <div class="stat-label">Soon</div>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn ${filterStatus==='all'?'active':''}" onclick="setFilter('status','all')">All</button>
      <button class="filter-btn ${filterStatus==='free'?'active':''}" onclick="setFilter('status','free')">Free</button>
      <button class="filter-btn ${filterStatus==='busy'?'active':''}" onclick="setFilter('status','busy')">Busy</button>
      <button class="filter-btn ${filterStatus==='soon'?'active':''}" onclick="setFilter('status','soon')">Soon</button>
      ${buildings.map(b=>`<button class="filter-btn ${filterBuilding===b?'active':''}" onclick="setFilter('building','${b}')">${b}</button>`).join('')}
    </div>

    <div class="section-title">Live Room Status</div>
    <div class="card">
      <div class="tbl-head">
        <span>Room</span><span>Status</span><span>Class Info</span><span></span>
      </div>
      ${filtered.length === 0 ? `<div style="padding:24px;text-align:center;color:var(--text-muted);font-size:14px">No rooms match filter</div>` :
      filtered.map(r => `
        <div class="room-row" onclick="navigate('room',{room:'${r.room_number}'})">
          <span class="room-num">${r.room_number}</span>
          <div style="width:70px">${badge(r.status)}</div>
          <div class="room-info">
            ${r.current_class?.subject
              ? `<div class="room-class">${r.current_class.subject}</div><div class="room-faculty">${[r.current_class.year, r.current_class.branch, r.current_class.section].filter(Boolean).join(' · ')} ${r.current_class.faculty_name||r.current_class.booked_by?'· '+(r.current_class.faculty_name||r.current_class.booked_by):''}</div>`
              : `<div style="font-size:13px;color:var(--text-muted)">Available</div>`}
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="#ccc" stroke-width="2" stroke-linecap="round"/></svg>
        </div>`).join('')}
    </div>
  </div>`;
}

function setFilter(type, val) {
  if (type==='status') filterStatus = val;
  if (type==='building') { filterBuilding = filterBuilding===val?'all':val; }
  renderDashboard();
}

async function renderRoom() {
  document.getElementById('body').innerHTML = loading();
  const now = getNow();
  const data = await api(`/api/rooms/${currentRoom}/schedule?day=${now.day}`);
  const room = data.room || {};
  const schedule = data.schedule || [];
  const nowMins = timeToMins(now.time);

  document.getElementById('header-right').innerHTML =
    `<span style="font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--purple);background:var(--purple-light);padding:4px 12px;border-radius:20px">Room ${currentRoom}</span>`;

  // Get status
  const sched = dashData?.rooms?.find(r=>r.room_number===currentRoom);
  const status = sched?.status || 'free';

  document.getElementById('body').innerHTML = `
  <div class="screen">
    <div style="padding:12px 16px">
      <button class="btn-back" onclick="navigate('dashboard')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 19l-7-7 7-7" stroke="var(--purple)" stroke-width="2" stroke-linecap="round"/></svg>
        Back
      </button>
    </div>
    <div class="hero-card">
      <div style="font-size:24px;font-weight:700;letter-spacing:-.02em">Room ${currentRoom}</div>
      <div style="font-size:13px;opacity:.8;margin-top:4px">${room.room_type||'Room'} · Capacity ${room.capacity||'–'} · ${room.building||''}</div>
      <div style="margin-top:12px">${badge(status)}</div>
    </div>

    <div class="section-title">Today's Schedule — ${now.day}</div>
    <div class="card">
      ${schedule.map(slot => {
        const sMins = timeToMins(slot.time);
        const isCur = sMins <= nowMins && nowMins < sMins + 60;
        return `
        <div class="timeline-row ${isCur?'current':''}">
          <div class="time-col">
            <span class="time-label" style="${isCur?'color:var(--purple);font-weight:600':''}">${slot.time}</span>
            <div class="time-line"></div>
          </div>
          <div style="flex:1">
            ${slot.entry
              ? `<div class="subject-title">${slot.entry.subject}</div>
                 <div class="subject-meta">${[slot.entry.year, slot.entry.branch, slot.entry.section].filter(Boolean).join(' · ')} ${slot.entry.faculty_name?'· '+slot.entry.faculty_name:''}</div>`
              : `<span class="available-pill">Room Available</span>`}
          </div>
          ${isCur ? '<div class="current-dot"></div>' : ''}
        </div>`;
      }).join('')}
    </div>

    ${teacher ? `
    <div style="margin:16px">
      <button class="btn-primary" onclick="navigate('booking')">Book This Room</button>
    </div>` : `
    <div style="margin:16px;padding:12px 16px;background:var(--purple-light);border-radius:10px;font-size:13px;color:var(--purple)">
      <strong>Login as a teacher</strong> to book this room.
    </div>`}
  </div>`;
}

async function renderUpload() {
  document.getElementById('header-right').innerHTML = `<span style="font-size:12px;color:var(--text-muted)">Admin</span>`;
  document.getElementById('body').innerHTML = `
  <div class="screen" style="padding:0 0 16px">
    <div style="padding:20px 16px 8px">
      <div style="font-size:22px;font-weight:700;color:var(--purple-dark);letter-spacing:-.03em">Upload Timetable</div>
      <div style="font-size:14px;color:var(--text-muted);margin-top:4px">Upload the PDF timetable to update room schedules.</div>
    </div>

    <div style="padding:0 16px 16px">
      <div class="dropzone" id="dropzone" ondragover="event.preventDefault();this.classList.add('drag')"
           ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)" onclick="document.getElementById('pdf-input').click()">
        <input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="handleFile(this.files[0])"/>
        <div class="dropzone-icon" id="dz-icon" style="background:var(--purple-light)">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">

async function addManualEntry() {
  const entry = {
    day: document.getElementById('m-day').value,
    start_time: document.getElementById('m-start').value,
    end_time: document.getElementById('m-end').value,
    room_number: document.getElementById('m-room').value,
    subject: document.getElementById('m-subject').value,
    faculty_code: document.getElementById('m-fc').value,
    faculty_name: document.getElementById('m-fc').value,
    section: document.getElementById('m-sec').value,
  };
  if (!entry.subject) { toast('Please enter a subject'); return; }
  await api('/api/timetable', {method:'POST', body:JSON.stringify(entry)});
  toast('✅ Entry added to timetable!');
  document.getElementById('m-subject').value = '';
}

function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
}

async function handleFile(file) {
  if (!file?.name?.endsWith('.pdf')) { toast('Please select a PDF file'); return; }
  const res = document.getElementById('upload-result');
  res.innerHTML = `<div class="alert alert-info">⏳ Processing ${file.name}...</div>`;
  const form = new FormData();
  form.append('file', file);
  form.append('session', document.getElementById('session-select')?.value || '2025-26');
  try {
    const r = await fetch('/api/timetable/upload', {method:'POST', body:form});
    const data = await r.json();
    if (data.success) {
      res.innerHTML = `<div class="alert alert-success">✅ ${data.message}</div>`;
      document.getElementById('dz-text').textContent = file.name;
    } else {
      res.innerHTML = `<div class="alert alert-error">❌ ${data.message}</div>`;
    }
  } catch(e) {
    res.innerHTML = `<div class="alert alert-error">❌ Upload failed</div>`;
  }
}

function getSlotLabel(time) {
  const h = parseInt(time.split(':')[0]);
  const m = parseInt(time.split(':')[1]);
  const total = h*60+m;
  if (total < 9*60 || total >= 16*60) return 'After Hours';
  const slotH = Math.floor((total - 9*60)/60) + 9;
  return `${String(slotH).padStart(2,'0')}:00 – ${String(slotH+1).padStart(2,'0')}:00`;
}

function timeToMins(t) {
  const [h,m] = t.split(':').map(Number);
  return h*60+m;
}
